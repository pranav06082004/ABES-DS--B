<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        async function myfun(){
        let promise = new Promise((resolve, reject) => {
            setTimeout(() => {
                resolve("Promise resolved");
            }, 1000);
        });
        let promise2 = await promise;
        alert(promise2);
    }
    myfun();
    </script>
</body>
</html>
