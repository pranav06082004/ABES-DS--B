<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class</title>
</head>
<body>
    <p id="class"></p>
    <script>
        class Person {
            constructor(name, age, city) {
                this.name = name;
                this.age = age;
                this.city = city;
            }
        }
        const person1 = new Person("lucky", 21, "Meerut");
        const person2 = new Person("Anshu", 20, "Delhi");
        document.getElementById("class").innerHTML = person1.name + " " + person1.age + " " + person1.city + "<br>" +
            person2.name + " " + person2.age + " " + person2.city;
    </script>
</body>
</html>
