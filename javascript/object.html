<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object</title>
</head>
<body>
    <p id="obj"></p>
    <script>
        const person= new Object({
            name:"lucky",
            age:21,
            city:"Meerut"
        });
        document.getElementById("obj").innerHTML=person.name + " " + person.age + " " + person.city;
    </script>
    
</body>
</html>
